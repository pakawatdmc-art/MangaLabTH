name: Sync Backend to Hugging Face Hub

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        uses: nateraw/huggingface-sync-action@main
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Doilange/manga-api
          repo_type: space
          space_sdk: docker
          hf_token: ${{ secrets.HF_TOKEN }}
          subdirectory: backend
