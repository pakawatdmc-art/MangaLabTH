name: Deploy Backend to HF Space (Official CLI)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Upload to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # คำสั่งนี้จะอัปโหลดไฟล์จากโฟลเดอร์ backend ไปที่ Root ของ Space โดยตรง
        run: |
          huggingface-cli upload Doilange/manga-api ./backend . --repo-type space --token $HF_TOKEN --commit-message "Deploy from GitHub Actions"
