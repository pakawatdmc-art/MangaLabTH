[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:nextjs]
command=node /app/frontend/.next/standalone/server.js
directory=/app/frontend/.next/standalone
environment=PORT="3000",HOSTNAME="0.0.0.0",NODE_ENV="production"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
startsecs=5
priority=10

[program:fastapi]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers %(ENV_WEB_CONCURRENCY)s --proxy-headers --forwarded-allow-ips=*
directory=/app/backend
environment=WEB_CONCURRENCY="%(ENV_WEB_CONCURRENCY)s"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
startsecs=3
priority=20
