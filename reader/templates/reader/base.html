<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}mangaFactory - อ่านมังงะออนไลน์{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans Thai', 'Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        surface: { DEFAULT: '#0c0c14', 50: '#12121c', 100: '#1a1a28', 200: '#222234' },
                        gold: { DEFAULT: '#c9a84c', light: '#e0c872', dark: '#a68a30', muted: 'rgba(201,168,76,0.15)' },
                    },
                },
            },
        }
    </script>
    <style>
        body { background-color: #0c0c14; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen text-gray-200 font-sans antialiased">

    {% block navbar %}
    <!-- Navbar -->
    <nav class="bg-surface-50/80 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-3">
            <a href="{% url 'reader:home' %}" class="flex items-center gap-2 group">
                <span class="text-xl font-bold tracking-tight text-white">manga</span>
                <span class="text-xl font-light tracking-tight text-gold">Factory</span>
            </a>
            <div class="hidden md:flex items-center gap-5 text-sm">
                <a href="{% url 'reader:home' %}" class="text-gray-400 hover:text-gold transition-colors">หน้าแรก</a>
                <a href="{% url 'reader:home' %}#latest-updates" class="text-gray-400 hover:text-gold transition-colors">อัปเดตล่าสุด</a>
            </div>
            <a href="/admin/"
               class="text-xs sm:text-sm px-3 py-1.5 rounded-md ring-1 ring-gold/30 text-gold hover:bg-gold/10 transition">
                หลังบ้าน
            </a>
        </div>
    </nav>
    {% endblock %}

    <!-- Content -->
    <main class="min-h-[calc(100vh-64px)]">
        {% block content %}{% endblock %}
    </main>

    {% block footer %}
    <!-- Footer -->
    <footer class="border-t border-white/5 mt-20">
        <div class="max-w-7xl mx-auto px-6 py-8 text-center text-gray-600 text-xs tracking-wide">
            &copy; 2026 mangaFactory · เว็บไซต์อ่านมังงะสำหรับผู้อ่านและทีมแปล
        </div>
    </footer>
    {% endblock %}

</body>
</html>
